<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Access Blocked | Agentic Shield</title>
  <style>
    :root { 
        --bg: #050505; 
        --card: #0c0c0e; 
        --gold: #D4AF37; 
        --crimson: #ef4444;
        --text: #f8fafc; 
        --muted: #71717a; 
    }
    body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    
    .card { 
        background: var(--card); 
        padding: 50px; 
        border-radius: 24px; 
        border: 1px solid var(--gold); 
        box-shadow: 0 0 50px rgba(212, 175, 55, 0.1); 
        text-align: center; 
        max-width: 550px; 
        position: relative; 
    }
    
    .icon { 
        font-size: 72px; 
        margin-bottom: 25px; 
        filter: drop-shadow(0 0 15px var(--gold));
        animation: pulse 2.5s infinite; 
    }
    
    h1 { margin: 0 0 15px; color: var(--gold); font-size: 32px; letter-spacing: 2px; text-transform: uppercase; }
    p { color: var(--muted); line-height: 1.8; margin-bottom: 35px; font-size: 16px; }
    
    .btn-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
    
    button { 
        padding: 14px 28px; 
        font-size: 14px; 
        font-weight: 700; 
        border: none; 
        border-radius: 10px; 
        cursor: pointer; 
        transition: all 0.3s; 
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    .btn-safe { background-color: var(--gold); color: black; }
    .btn-safe:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
    
    .btn-analyze { background-color: transparent; color: var(--crimson); border: 1px solid var(--crimson); }
    .btn-analyze:hover { background-color: var(--crimson); color: white; transform: scale(1.05); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    
    .btn-danger { background-color: transparent; color: var(--muted); border: 1px solid #27272a; font-size: 12px; padding: 10px 20px; }
    .btn-danger:hover { color: var(--text); border-color: var(--muted); }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Connection Neutralized</h1>
    <p>The Agentic engine has intercepted this navigation request. The destination pattern indicates a high-probability threat vector associated with phishing or malware distribution.</p>
    
    <div class="btn-group">
      <button class="btn-safe" id="go-back">Return to Safety</button>
      <button class="btn-analyze" id="analyze-threat">📋 Copy URL & Open Admin Console</button>
    </div>
    
    <button class="btn-danger" id="proceed">Proceed Anyway (Bypass Shield)</button>
  </div>
  <script src="warning.js"></script>
</body>
</html>
