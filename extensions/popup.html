<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; }
    h3 { color: #ff4444; margin-top: 0; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
    button { width: 100%; padding: 10px; background-color: #ff4444; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:hover { background-color: #ff2222; }
    #result { margin-top: 15px; padding: 10px; border-radius: 5px; background-color: #1e1e1e; font-size: 13px; display: none; }
    .loader { border: 3px solid #333; border-top: 3px solid #ff4444; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h3>🛡️ Threat Scanner</h3>
  <p id="current-url" style="word-wrap: break-word; font-size: 12px; color: #aaa;">Getting current tab...</p>
  
  <button id="scan-btn">Scan This Website</button>
  <div class="loader" id="loading"></div>
  
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
