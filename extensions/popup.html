<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root { 
        --bg: #050505; 
        --card: rgba(18, 18, 18, 0.85); 
        --text: #f8fafc; 
        --accent: #D4AF37; 
        --accent-glow: rgba(212, 175, 55, 0.25);
        --border: #27272a;
    }
    body { 
        width: 340px; 
        margin: 0; 
        padding: 24px; 
        font-family: 'Inter', sans-serif; 
        /* This creates the gold "light" background effect you liked in blue */
        background: radial-gradient(circle at top right, #2b2310, #050505 70%); 
        color: var(--text); 
        overflow: hidden;
    }
    .header { 
        display: flex; align-items: center; justify-content: center; gap: 12px; 
        margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; 
    }
    h3 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }
    
    .toggle-container { 
        display: flex; justify-content: space-between; align-items: center; 
        margin-bottom: 24px; padding: 14px 18px; background: var(--card); 
        backdrop-filter: blur(15px); border-radius: 12px; border: 1px solid var(--accent); 
        box-shadow: 0 0 25px var(--accent-glow); 
    }
    .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3f3f46; transition: .4s; border-radius: 26px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(22px); }

    .scan-container { display: flex; flex-direction: column; align-items: center; padding: 24px 0; }
    .glow-ring { 
        width: 44px; height: 44px; border-radius: 50%; border: 2px solid transparent; 
        border-top-color: var(--accent); border-bottom-color: var(--accent);
        animation: spin 1.2s linear infinite; filter: drop-shadow(0 0 10px var(--accent));
    }
    
    #result { 
        display: none; padding: 18px; border-radius: 12px; background: var(--card); 
        backdrop-filter: blur(15px); border: 1px solid var(--border); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.4s ease; 
    }
    .result-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .metric { font-size: 13px; margin-bottom: 8px; color: #a1a1aa; }
    .metric span { font-weight: 600; color: #fff; }
    .reason { font-size: 12px; color: #d4d4d8; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); line-height: 1.6; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { opacity: 1 !important; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size: 24px;">🛡️</span>
    <h3>Agentic Shield</h3>
  </div>
  <div class="toggle-container">
    <span id="status-text">Shield is ON</span>
    <label class="switch">
      <input type="checkbox" id="master-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="scan-container" id="loading-view"><div class="glow-ring"></div></div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
