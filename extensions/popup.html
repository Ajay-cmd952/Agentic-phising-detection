<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --danger: #ef4444; --safe: #10b981; }
    body { width: 340px; margin: 0; padding: 20px; font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); }
    .header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
    h3 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
    .target-url { font-size: 11px; color: #94a3b8; word-break: break-all; background: var(--card); padding: 8px; border-radius: 6px; text-align: center; margin-bottom: 15px; border: 1px solid #334155; }
    
    /* Dynamic Loader */
    .scan-container { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
    .pulse-ring { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--accent); animation: spin 1s linear infinite; }
    .loading-text { margin-top: 15px; font-size: 13px; color: #cbd5e1; animation: pulse 1.5s ease-in-out infinite; }
    
    /* Result Card */
    #result { display: none; padding: 15px; border-radius: 8px; background: var(--card); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-top: 10px; opacity: 0; transition: opacity 0.3s ease; }
    .result-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .metric { font-size: 12px; margin-bottom: 5px; color: #cbd5e1; }
    .metric span { font-weight: 600; color: #fff; }
    .reason { font-size: 11px; color: #94a3b8; margin-top: 10px; padding-top: 10px; border-top: 1px solid #334155; line-height: 1.4; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 50% { opacity: 0.5; } }
    .fade-in { opacity: 1 !important; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size: 20px;">🛡️</span>
    <h3>Agentic Shield</h3>
  </div>
  
  <div class="target-url" id="current-url">Initializing...</div>
  
  <div class="scan-container" id="loading-view">
    <div class="pulse-ring"></div>
    <div class="loading-text">AI analyzing domain structure...</div>
  </div>
  
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
